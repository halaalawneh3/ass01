<!doctype html>
<html lang="ar">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact - SID:162092 - Hala Waleed Al-Alawneh</title>
  <style>
    :root{--bg:#071226; --card:#0b1220; --accent:#6ee7b7; --text:#e6eef6; --muted:#94a3b8; max-width:760px;}
    *{box-sizing:border-box}
    body{margin:0; min-height:100vh; font-family: "Segoe UI", Tahoma, Arial, sans-serif; background:linear-gradient(180deg,#041021,#061426); color:var(--text); display:flex; align-items:center; justify-content:center; padding:28px;}
    .container{width:100%; max-width:var(--max-width); background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border-radius:12px; padding:22px; border:1px solid rgba(255,255,255,0.03);}
    header{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;}
    h1{margin:0; font-size:1.4rem;}
    nav a{color:var(--accent); text-decoration:none; margin-left:12px; font-weight:600;}
    form{margin-top:18px; display:grid; gap:12px; text-align:right;}
    label{font-size:0.95rem; color:var(--muted);}
    input, select, textarea{width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.04); background:rgba(255,255,255,0.02); color:var(--text);}
    button{background:var(--accent); color:#071226; padding:10px 14px; border:none; border-radius:8px; font-weight:700; cursor:pointer;}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
    @media (max-width:640px){ .row{grid-template-columns:1fr} nav{width:100%; text-align:center; margin-top:8px;} }
  </style>
  <script>
    function validateAndSubmit(e){
      e.preventDefault();
      var name = document.getElementById('fullname').value.trim();
      var email = document.getElementById('email').value.trim();
      var country = document.getElementById('country').value;
      var comments = document.getElementById('comments').value.trim();
      if(!name || !email || !country || !comments){
        alert('Please fill out all fields before submitting.');
        return false;
      }
      var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if(!emailRe.test(email)){
        alert('Please enter a valid email.');
        return false;
      }
      alert('The form has been submitted successfully. Thank you for contacting us!');
      document.getElementById('contactForm').reset();
      return true;
    }
    window.addEventListener('DOMContentLoaded', function(){
      document.getElementById('contactForm').addEventListener('submit', validateAndSubmit);
    });
  </script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Contact Me</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact Me</a>
      </nav>
    </header>

    <form id="contactForm" novalidate>
      <div class="row">
        <div>
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" placeholder="Your full name">
        </div>
        <div>
          <label for="email">Email address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com">
        </div>
      </div>

      <div>
        <label for="country">Country</label>
        <select id="country" name="country">
          <option value="">-- Select country --</option>
          <option value="JO">Jordan</option>
          <option value="US">United States</option>
          <option value="GB">United Kingdom</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div>
        <label for="comments">Comments</label>
        <textarea id="comments" name="comments" rows="6" placeholder="Your message"></textarea>
      </div>

      <div style="text-align:left; margin-top:6px;">
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>
</body>
</html>
